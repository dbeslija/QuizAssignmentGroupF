<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Quiz assignment group F</title>
  </head>

  <body>
    <div class="point-counter">Poäng: 0</div>
    <div class="wrapper-container">
    
      <main class="quiz-container">
        <div hidden id="approved"></div>
        <div hidden id="notapproved"></div>

        <div class="question-area">
          <h2 id="question-text"></h2>
          <div class="alternative-wrapper">
            <div class="questions-container">
              <input type="radio" name="answer-radio" id="0" />
              <label for="0" id="answer-text-1">Svar 1</label>        
            </div>

            <div class="questions-container">
              <input type="radio" name="answer-radio" id="1" />
              <label for="1" id="answer-text-2">Svar 2</label>
            </div>

            <div class="questions-container">
              <input type="radio" name="answer-radio" id="2" />
              <label for="2" id="answer-text-3">Svar 3</label>
            </div>

            <div class="questions-container">
              <input type="radio" name="answer-radio" id="3" />
              <label for="3" id="answer-text-4">Svar 4</label>
            </div>
          </div>

          <button id="next-question">Nästa fråga</button>
        

          <p id="user-error-message"></p>
        </div>
      </main >
      <div hidden class="final-result">
        <p class="result-text"></p>
        <button class="reset-game">Börja om</button>
       
      </div> 
      
    </div>
    <script src="script.js"></script>
  </body>
</html>
